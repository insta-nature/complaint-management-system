<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="asset/style.css">
    <link rel="stylesheet" href="asset/public-form.css">
</head>
<body>
    <!-- ============ TOPBAR ============ -->
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-sm btn-light border d-lg-none" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
            <div class="brand"><span class="mark"><i class="fa-solid fa-headset"></i></span> ResolveDesk</div>
        </div>
        <div class="role-switch" id="roleSwitch">
            <button data-role="admin"><i class="fa-solid fa-user-shield me-1"></i>Admin</button>
            <button data-role="employee"><i class="fa-solid fa-user-gear me-1"></i>Employee</button>
        </div>
    </div>

    <!-- ============ TOAST HOST ============ -->
    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastHost"></div>

    <div id="app"></div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="asset/demo-data.js"></script>
</body>
</html>
