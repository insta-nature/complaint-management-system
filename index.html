<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResolveDesk — Complaint Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --brand-1:#f5821f;
  --brand-2:#f36523;
  --brand-grad: linear-gradient(135deg, var(--brand-1), var(--brand-2));
  --ink:#1e2530;
  --ink-soft:#525b6b;
  --bg:#f7f7f9;
  --card:#ffffff;
  --line:#e8e8ec;
  --st-pending:#8a8f98;
  --st-assigned:#2f6fed;
  --st-progress:#f36523;
  --st-completed:#1aa260;
  --st-closed:#0b6b3a;
  --st-rejected:#d5342c;
  --radius:14px;
  --shadow: 0 2px 10px rgba(30,37,48,.06), 0 1px 2px rgba(30,37,48,.05);
}
*{box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
  margin:0;
}
h1,h2,h3,h4,h5,.brand-font{font-family:'Poppins',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}
a{text-decoration:none;}

/* ---------- Topbar ---------- */
.topbar{
  background:var(--card);
  border-bottom:1px solid var(--line);
  padding:.65rem 1.25rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:1000;
}
.brand{
  display:flex;
  align-items:center;
  gap:.6rem;
  font-weight:700;
  font-size:1.15rem;
}
.brand .mark{
  width:36px;height:36px;border-radius:10px;
  background:var(--brand-grad);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.05rem;
  box-shadow:0 4px 10px rgba(243,101,35,.35);
}
.role-switch{
  display:flex;
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:999px;
  padding:4px;
  gap:2px;
}
.role-switch button{
  border:none;background:transparent;
  padding:.4rem 1rem;
  border-radius:999px;
  font-weight:600;
  font-size:.85rem;
  color:var(--ink-soft);
  transition:.15s;
}
.role-switch button.active{
  background:var(--brand-grad);
  color:#fff;
  box-shadow:0 2px 8px rgba(243,101,35,.35);
}

/* ---------- Layout ---------- */
.app-shell{display:flex; min-height:calc(100vh - 62px);}
.sidebar{
  width:250px;
  background:var(--ink);
  color:#c9cedb;
  flex-shrink:0;
  padding:1.1rem .8rem;
}
.sidebar .side-section-title{
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:#7c8394;
  margin:1.1rem .6rem .4rem;
  font-weight:700;
}
.sidebar a.nav-item{
  display:flex;align-items:center;gap:.65rem;
  padding:.55rem .7rem;
  border-radius:9px;
  color:#c9cedb;
  font-size:.89rem;
  font-weight:500;
  margin-bottom:2px;
}
.sidebar a.nav-item i{width:18px;text-align:center;color:#8890a0;}
.sidebar a.nav-item:hover{background:#2a3140;color:#fff;}
.sidebar a.nav-item.active{
  background:var(--brand-grad);
  color:#fff;
}
.sidebar a.nav-item.active i{color:#fff;}
.main{flex:1; padding:1.4rem 1.6rem; min-width:0;}

/* ---------- Cards ---------- */
.card-flat{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.stat-card{
  padding:1.1rem 1.2rem;
  display:flex;
  align-items:center;
  gap:.9rem;
}
.stat-card .icon-wrap{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;color:#fff;flex-shrink:0;
}
.stat-card .num{font-size:1.5rem;font-weight:700;font-family:'Poppins',sans-serif;line-height:1;}
.stat-card .label{font-size:.78rem;color:var(--ink-soft);font-weight:500;margin-top:2px;}

/* ---------- Badges ---------- */
.badge-status{
  padding:.32rem .7rem;
  border-radius:999px;
  font-size:.72rem;
  font-weight:600;
  color:#fff;
  letter-spacing:.02em;
  display:inline-block;
}
.b-pending, .bar.b-Pending {background:var(--st-pending);}
.b-assigned, .bar.b-assigned {background:var(--st-assigned);}
.b-progress, .bar.b-progress {background:var(--st-progress);}
.b-completed, .bar.b-completed {background:var(--st-completed);}
.b-closed, .bar.b-closed {background:var(--st-closed);}
.b-rejected, .bar.b-rejected {background:var(--st-rejected);}

.priority-High{color:#d5342c;font-weight:700;}
.priority-Medium{color:#c98a12;font-weight:700;}
.priority-Low{color:#1aa260;font-weight:700;}

/* ---------- Buttons ---------- */
.btn-brand{
  background:var(--brand-grad);
  border:none;color:#fff;font-weight:600;
  box-shadow:0 3px 10px rgba(243,101,35,.3);
}
.btn-brand:hover{color:#fff; filter:brightness(1.05);}
.btn-outline-brand{
  border:1.5px solid var(--brand-2);
  color:var(--brand-2);
  font-weight:600;
  background:transparent;
}
.btn-outline-brand:hover{background:var(--brand-2);color:#fff;}

/* ---------- Tables ---------- */
.table-clean thead th{
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--ink-soft);
  background:#fafafb;
  border-bottom:1px solid var(--line);
  font-weight:700;
  white-space:nowrap;
}
.table-clean td{
  font-size:.87rem;
  vertical-align:middle;
}
.table-clean tbody tr:hover{background:#fff8f2;}
.icon-btn{
  width:32px;height:32px;border-radius:8px;
  display:inline-flex;align-items:center;justify-content:center;
  border:1px solid var(--line);
  background:#fff;color:var(--ink-soft);
  margin-right:3px;
  font-size:.8rem;
}
.icon-btn:hover{background:var(--bg);}
.icon-btn.view:hover{color:#2f6fed;border-color:#2f6fed;}
.icon-btn.edit:hover{color:var(--brand-2);border-color:var(--brand-2);}
.icon-btn.del:hover{color:#d5342c;border-color:#d5342c;}

/* ---------- Public page ---------- */
.public-hero{
  background:var(--brand-grad);
  color:#fff;
  padding:3.2rem 1rem 5.5rem;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.public-hero::before{
  content:"";
  position:absolute; inset:0;
  background-image: radial-gradient(circle at 15% 30%, rgba(255,255,255,.12) 0, transparent 45%),
                     radial-gradient(circle at 85% 70%, rgba(255,255,255,.10) 0, transparent 40%);
}
.public-hero h1{font-size:2.1rem;font-weight:800;position:relative;}
.public-hero p{opacity:.92;max-width:560px;margin:.5rem auto 0;position:relative;}
.form-shell{
  max-width:820px;
  margin:-3.4rem auto 3rem;
  padding:0 1rem;
  position:relative;
}
.section-label{
  font-size:.72rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--brand-2);
  margin-bottom:.3rem;
}
.form-label{font-weight:600;font-size:.85rem;color:var(--ink);}
.form-control:focus,.form-select:focus{
  border-color:var(--brand-2);
  box-shadow:0 0 0 .2rem rgba(243,101,35,.15);
}
.captcha-box{
  background:#f2f3f5;
  border:1px dashed #c7c9d1;
  border-radius:10px;
  padding:.6rem 1rem;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  letter-spacing:.35em;
  font-size:1.15rem;
  color:var(--ink);
  user-select:none;
  display:inline-block;
  background-image: repeating-linear-gradient(115deg, rgba(0,0,0,.03) 0 2px, transparent 2px 6px);
}
.file-drop{
  border:1.5px dashed #c7c9d1;
  border-radius:10px;
  padding:1.1rem;
  text-align:center;
  color:var(--ink-soft);
  background:#fafafc;
  cursor:pointer;
  font-size:.85rem;
}
.file-drop:hover{border-color:var(--brand-2); color:var(--brand-2);}
.file-chip{
  display:inline-flex;align-items:center;gap:.4rem;
  background:#fff2e8;color:var(--brand-2);
  border:1px solid #ffd9b8;
  border-radius:8px;
  padding:.25rem .6rem;
  font-size:.78rem;
  margin:3px 4px 0 0;
}
.file-chip i.remove{cursor:pointer;color:#b3552a;}

/* ---------- Timeline / Stepper (signature element) ---------- */
.stepper{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  padding:1.2rem .5rem .4rem;
  position:relative;
}
.stepper::before{
  content:"";
  position:absolute;
  top:31px; left:8%; right:8%;
  height:3px;
  background:var(--line);
  z-index:0;
}
.stepper .step{
  position:relative;z-index:1;
  flex:1;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
}
.stepper .dot{
  width:38px;height:38px;border-radius:50%;
  background:#fff;border:3px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:#c3c6cf; font-size:.85rem;
  transition:.2s;
}
.stepper .step.done .dot{
  background:var(--brand-grad);border-color:transparent;color:#fff;
  box-shadow:0 3px 8px rgba(243,101,35,.35);
}
.stepper .step.current .dot{
  border-color:var(--brand-2); color:var(--brand-2); background:#fff8f2;
  animation:pulse 1.8s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(243,101,35,.35);}
  70%{box-shadow:0 0 0 8px rgba(243,101,35,0);}
  100%{box-shadow:0 0 0 0 rgba(243,101,35,0);}
}
.stepper .step-label{font-size:.72rem;font-weight:600;margin-top:.4rem;color:var(--ink-soft);max-width:80px;}
.stepper .step.done .step-label, .stepper .step.current .step-label{color:var(--ink);}

/* ---------- Misc ---------- */
.chart-bars{display:flex;align-items:flex-end;gap:.9rem;height:160px;padding:0 .3rem;}
.chart-bars .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.chart-bars .bar{width:100%;max-width:34px;border-radius:6px 6px 0 0;background:var(--brand-grad);transition:.4s;}
.chart-bars .bar-val{font-size:.72rem;font-weight:700;margin-bottom:2px;}
.chart-bars .bar-name{font-size:.68rem;color:var(--ink-soft);margin-top:.4rem;text-align:center;}

.section-title{font-weight:700;font-size:1.05rem;margin-bottom:0;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;flex-wrap:wrap;gap:.6rem;}
.thumb-preview{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line);}
.empty-state{padding:3rem 1rem;text-align:center;color:var(--ink-soft);}
.empty-state i{font-size:2.2rem;color:#d8dae0;margin-bottom:.6rem;}
.view-page{display:none;}
.view-page.active{display:block;}
.toast-container{z-index:2000;}
.progress-thin{height:6px;border-radius:4px;}
.progress-thin .progress-bar{background:var(--brand-grad);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#d8dae0;border-radius:4px;}

@media (max-width: 991px){
  .sidebar{position:fixed; left:-260px; top:62px; bottom:0; z-index:999; transition:.25s; overflow-y:auto;}
  .sidebar.open{left:0;}
  .main{padding:1rem;}
}
</style>
</head>
<body>

<!-- ============ TOPBAR ============ -->
<div class="topbar">
  <div class="d-flex align-items-center gap-3">
    <button class="btn btn-sm btn-light border d-lg-none" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="brand"><span class="mark"><i class="fa-solid fa-headset"></i></span> ResolveDesk</div>
  </div>
  <div class="role-switch" id="roleSwitch">
    <button data-role="public" class="active"><i class="fa-solid fa-user me-1"></i>Public</button>
    <button data-role="admin"><i class="fa-solid fa-user-shield me-1"></i>Admin</button>
    <button data-role="employee"><i class="fa-solid fa-user-gear me-1"></i>Employee</button>
  </div>
</div>

<!-- ============ TOAST HOST ============ -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastHost"></div>

<div id="app"></div>

<!-- Bootstrap Bundle -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script>
/* =======================================================================
   RESOLVEDESK — Complaint Management System (PHP + MySQL backend)
   ======================================================================= */

const API = "api"; // relative path to the api/ folder

const STATUS_ORDER = ["Pending","Assigned","In Progress","Completed","Closed"];
const STATUS_BADGE = {
  "Pending":"b-pending","Assigned":"b-assigned","In Progress":"b-progress",
  "Completed":"b-completed","Closed":"b-closed","Rejected":"b-rejected"
};
const CATEGORIES = ["Water Supply","Electricity","Road & Infrastructure","Sanitation","Noise Pollution","Public Property Damage","Street Lighting","Other"];
const DEPARTMENTS = ["Public Works","Electrical","Water Board","Sanitation","Administration"];

let currentUser = null; // { id, username, role, employee_id, display_name }
let state = { adminSection:"dashboard", filters:{status:"",category:"",search:""} };
let pendingFiles = { reg: [], before: [], after: [] };
let currentCaptcha = "";
let cache = { employees: [], complaints: [] };

/* ---------------- generic API helper ---------------- */
async function api(endpoint, { method = "GET", params = null, form = null } = {}) {
  let url = `${API}/${endpoint}`;
  const opts = { method, credentials: "include" };
  if (method === "GET" && params) {
    url += "?" + new URLSearchParams(params).toString();
  } else if (form) {
    opts.body = form; // FormData — browser sets multipart headers automatically
  } else if (params) {
    opts.headers = { "Content-Type": "application/x-www-form-urlencoded" };
    opts.body = new URLSearchParams(params).toString();
  }
  let res, data;
  try {
    res = await fetch(url, opts);
    data = await res.json();
  } catch (err) {
    showToast("Network error — check your API/database connection.", "error");
    throw err;
  }
  if (!data.success) {
    showToast(data.message || "Something went wrong.", "error");
    throw new Error(data.message || "API error");
  }
  return data;
}

/* ---------------- utils ---------------- */
function fmtDate(d){ if(!d) return "—"; const dt = new Date(d); return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(d){ if(!d) return "—"; const dt = new Date(d); return dt.toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function empName(id, list){ const e = (list||cache.employees).find(x=>String(x.id)===String(id)); return e ? e.name : "Unassigned"; }
function escapeHtml(s){ return (s==null?"":String(s)).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fileUrl(path){ return path; } // uploads/... paths are already relative to project root

function showToast(msg, type="success"){
  const icon = type==="success" ? "fa-circle-check" : type==="error" ? "fa-circle-exclamation" : "fa-circle-info";
  const bg = type==="success" ? "#1aa260" : type==="error" ? "#d5342c" : "#2f6fed";
  const el = document.createElement("div");
  el.className = "toast align-items-center border-0 show mb-2";
  el.style.background = "#fff";
  el.style.borderLeft = `4px solid ${bg}`;
  el.style.boxShadow = "0 6px 20px rgba(30,37,48,.12)";
  el.innerHTML = `<div class="d-flex">
      <div class="toast-body fw-semibold" style="color:${bg}"><i class="fa-solid ${icon} me-2"></i>${escapeHtml(msg)}</div>
      <button type="button" class="btn-close me-2 m-auto" onclick="this.closest('.toast').remove()"></button>
    </div>`;
  document.getElementById("toastHost").appendChild(el);
  setTimeout(()=>el.remove(), 4200);
}

function setBusy(on){
  document.getElementById("app").style.opacity = on ? .55 : 1;
  document.getElementById("app").style.pointerEvents = on ? "none" : "auto";
}

function genCaptcha(){
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let s = "";
  for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  currentCaptcha = s;
  const box = document.getElementById("captchaText");
  if(box) box.textContent = s;
}

function buildStepper(status){
  const idx = STATUS_ORDER.indexOf(status);
  const icons = ["fa-file-circle-plus","fa-user-check","fa-screwdriver-wrench","fa-clipboard-check","fa-box-archive"];
  return `<div class="stepper">
    ${STATUS_ORDER.map((s,i)=>{
      let cls = i < idx ? "done" : i===idx ? "current" : "";
      return `<div class="step ${cls}">
        <div class="dot"><i class="fa-solid ${icons[i]}"></i></div>
        <div class="step-label">${s}</div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderFileChips(containerId, files, tag){
  const el = document.getElementById(containerId);
  if(!el) return;
  if(!files.length){ el.innerHTML = ""; return; }
  el.innerHTML = files.map((f,i)=>`<span class="file-chip"><i class="fa-solid fa-paperclip"></i>${escapeHtml(f.name)} <i class="fa-solid fa-xmark remove" onclick="removeFile('${tag}',${i},'${containerId}')"></i></span>`).join("");
}
function removeFile(tag, idx, containerId){
  pendingFiles[tag].splice(idx,1);
  renderFileChips(containerId, pendingFiles[tag], tag);
}
/* =======================================================================
   PUBLIC VIEW — Register Complaint
   ======================================================================= */
function renderPublic(){
  pendingFiles.reg = [];
  const html = `
  <div class="public-hero">
    <span class="badge bg-white text-dark bg-opacity-25 mb-2" style="letter-spacing:.06em;font-size:.7rem;">CITIZEN SERVICES PORTAL</span>
    <h1>Register a Complaint</h1>
    <p>Tell us what's wrong — road, water, power, or public property. We route it to the right team and keep you posted until it's resolved.</p>
  </div>
  <div class="form-shell">
    <div class="card-flat p-4 p-md-5">
      <div class="section-label">Complaint Details</div>
      <h4 class="mb-4">New Complaint Form</h4>
      <form id="complaintForm" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="f_name" required placeholder="e.g. Vikram Patil">
          </div>
          <div class="col-md-6">
            <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
            <input type="tel" class="form-control" id="f_mobile" required pattern="[0-9]{10}" maxlength="10" placeholder="10-digit mobile number">
          </div>
          <div class="col-md-6">
            <label class="form-label">Email <span class="text-muted">(optional)</span></label>
            <input type="email" class="form-control" id="f_email" placeholder="you@example.com">
          </div>
          <div class="col-md-6">
            <label class="form-label">Complaint Date <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="f_date" required disabled>
          </div>
          <div class="col-md-6">
            <label class="form-label">Category <span class="text-danger">*</span></label>
            <select class="form-select" id="f_category" required>
              <option value="" selected disabled>Choose a category</option>
              ${CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join("")}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Subject <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="f_subject" required placeholder="Brief title of your complaint">
          </div>
          <div class="col-12">
            <label class="form-label">Description <span class="text-danger">*</span></label>
            <textarea class="form-control" id="f_desc" rows="4" required placeholder="Describe the issue in detail — location, duration, impact..."></textarea>
          </div>
          <div class="col-12">
            <label class="form-label">Attachments <span class="text-muted">(JPG, PNG, PDF, DOC, DOCX — max 10MB each)</span></label>
            <label class="file-drop d-block" for="f_files">
              <i class="fa-solid fa-cloud-arrow-up me-2"></i>Click to choose files, or drag and drop here
            </label>
            <input type="file" id="f_files" class="d-none" multiple accept=".jpg,.jpeg,.png,.pdf,.doc,.docx">
            <div id="f_files_list" class="mt-2"></div>
          </div>
          <div class="col-12">
            <label class="form-label">Verify you're human <span class="text-danger">*</span></label>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <span class="captcha-box" id="captchaText"></span>
              <button type="button" class="btn btn-sm btn-light border" onclick="genCaptcha()"><i class="fa-solid fa-rotate"></i></button>
              <input type="text" class="form-control" id="f_captcha" style="max-width:180px" placeholder="Enter code above" required>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-4 pt-2 border-top">
          <small class="text-muted">Fields marked <span class="text-danger">*</span> are required</small>
          <button type="submit" class="btn btn-brand px-4 py-2"><i class="fa-solid fa-paper-plane me-2"></i>Submit Complaint</button>
        </div>
      </form>
    </div>

    <div class="card-flat p-4 mt-4">
      <div class="section-label">Track</div>
      <h5 class="mb-3">Already registered? Track your complaint status</h5>
      <div class="input-group" style="max-width:420px">
        <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
        <input type="text" class="form-control" id="trackId" placeholder="Enter Complaint ID e.g. 6">
        <button class="btn btn-outline-brand" onclick="trackComplaint()">Track</button>
      </div>
      <div id="trackResult" class="mt-3"></div>
    </div>
  </div>`;
  document.getElementById("app").innerHTML = html;
  document.getElementById("f_date").value = new Date().toISOString().slice(0,10);
  genCaptcha();

  document.getElementById("f_files").addEventListener("change", (e)=>{
    pendingFiles.reg = Array.from(e.target.files);
    renderFileChips("f_files_list", pendingFiles.reg, "reg");
  });

  document.getElementById("complaintForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const mobile = document.getElementById("f_mobile").value.trim();
    const captchaVal = document.getElementById("f_captcha").value.trim().toUpperCase();
    if(!/^[0-9]{10}$/.test(mobile)){ showToast("Please enter a valid 10-digit mobile number.","error"); return; }
    if(captchaVal !== currentCaptcha){ showToast("Captcha does not match. Please try again.","error"); genCaptcha(); document.getElementById("f_captcha").value=""; return; }

    const fd = new FormData();
    fd.append("action","create");
    fd.append("name", document.getElementById("f_name").value.trim());
    fd.append("mobile", mobile);
    fd.append("email", document.getElementById("f_email").value.trim());
    fd.append("subject", document.getElementById("f_subject").value.trim());
    fd.append("category", document.getElementById("f_category").value);
    fd.append("description", document.getElementById("f_desc").value.trim());
    fd.append("date", document.getElementById("f_date").value);
    pendingFiles.reg.forEach(f => fd.append("attachments[]", f));

    setBusy(true);
    try{
      const res = await api("complaints.php", { method:"POST", form: fd });
      showToast(res.message);
      renderPublic();
    } catch(_) { /* toast already shown */ }
    finally { setBusy(false); }
  });
}

async function trackComplaint(){
  const id = document.getElementById("trackId").value.trim();
  const box = document.getElementById("trackResult");
  if(!id){ return; }
  try{
    const res = await api("complaints.php", { params:{action:"track", id} });
    const c = res.complaint;
    box.innerHTML = `
      <div class="border rounded-3 p-3">
        <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
          <div><span class="mono text-muted">#${c.id}</span> — <strong>${escapeHtml(c.subject)}</strong></div>
          <span class="badge-status ${STATUS_BADGE[c.status]}">${c.status}</span>
        </div>
        ${buildStepper(c.status)}

  } catch(_) {
    box.innerHTML = `<div class="alert alert-light border text-muted mb-0"><i class="fa-solid fa-circle-info me-2"></i>No complaint found with that ID.</div>`;
  }
}

async function renderAdminSection(){
  const main = document.getElementById("adminMain");

  try{
    if(key==="dashboard") main.innerHTML = await adminDashboardHTML();
    else if(key==="employees") main.innerHTML = await employeeMasterHTML();
    else if(["all","pending","assigned","progress","completed","closed"].includes(key)) main.innerHTML = await complaintListHTML(key);

    else if(key==="categories") main.innerHTML = categoriesHTML();

function drawDashboardChart(){
  const el = document.getElementById("dashChart");

  const counts = STATUS_ORDER.map(s=>window.__dashCounts[s]||0);
  const max = Math.max(...counts, 1);
  el.innerHTML = STATUS_ORDER.map((s,i)=>`
    <div class="bar-col">
      <div class="bar-val">${counts[i]}</div>
      <div class="bar b-${s.toLowerCase}" style="height:${(counts[i]/max*120)||2}px"></div>
      <div class="bar-name">${s}</div>
    </div>`).join("");

async function saveEmployee(){
  const name = document.getElementById("e_name").value.trim();
  const mobile = document.getElementById("e_mobile").value.trim();
  const designation = document.getElementById("e_designation").value.trim();
  if(!name || !/^[0-9]{10}$/.test(mobile) || !designation){ showToast("Please fill all required fields correctly.","error"); return; }
  const id = document.getElementById("e_id").value;
  const params = {
    action: id ? "update" : "create",
    id: id || undefined,
    name, mobile, email: document.getElementById("e_email").value.trim(),
    department: document.getElementById("e_department").value, designation,
    status: document.getElementById("e_status").value,
    address: document.getElementById("e_address").value.trim()
  };
  setBusy(true);
  try{
    const res = await api("employees.php", { method:"POST", params });
    showToast(res.message);
    bootstrap.Modal.getInstance(document.getElementById("employeeModal")).hide();
    await renderAdminSection();
  } catch(_) {} finally { setBusy(false); }

    showToast(res.message, "error");
    await renderAdminSection();
  } catch(_) {} finally { setBusy(false); }
}

              <button class="icon-btn del" onclick="deleteComplaint(${c.id})" title="Delete"><i class="fa-solid fa-trash"></i></button>

          </tr>`).join("") || `<tr><td colspan="9"><div class="empty-state"><i class="fa-solid fa-inbox d-block"></i>No complaints match your filters</div></td></tr>`}
        </tbody>
      </table>
    </div>
  </div>
  ${complaintModalsHTML()}`;
}

async function deleteComplaint(id){
  if(!confirm("Delete this complaint permanently?")) return;
  setBusy(true);
  try{
    const res = await api("complaints.php", { method:"POST", params:{action:"delete", id} });
    showToast(res.message, "error");
    await renderAdminSection();
  } catch(_) {} finally { setBusy(false); }
}

function exportData(type){
  showToast(`${type==='excel'?'Excel':'PDF'} export generated for current list.`, "info");
}

  document.getElementById("viewModalBody").innerHTML = `
    <div class="p-4 pb-0 d-flex justify-content-between align-items-start flex-wrap gap-2">
      <div>
        <div class="text-muted small mono">Complaint ID #${c.id}</div>
        <h5 class="mb-0">${escapeHtml(c.subject)}</h5>
      </div>
      <span class="badge-status ${STATUS_BADGE[c.status]}">${c.status}</span>
    </div>
    <div class="px-4">${buildStepper(c.status)}</div>
    <div class="px-4 pb-4">
      <div class="row g-3 small">
        <div class="col-md-6"><div class="text-muted">Name</div><div class="fw-semibold">${escapeHtml(c.name)}</div></div>
        <div class="col-md-6"><div class="text-muted">Mobile</div><div class="fw-semibold mono">${c.mobile}</div></div>
        <div class="col-md-6"><div class="text-muted">Date Raised</div><div class="fw-semibold">${fmtDate(c.complaint_date)}</div></div>
        <div class="col-md-6"><div class="text-muted">Category</div><div class="fw-semibold">${c.category}</div></div>
        <div class="col-md-6"><div class="text-muted">Assigned Employee</div><div class="fw-semibold">${c.employee_name || "Unassigned"}</div></div>
        <div class="col-md-6"><div class="text-muted">Priority</div><div class="fw-semibold priority-${c.priority}">${c.priority}</div></div>
        <div class="col-12"><div class="text-muted">Description</div><div>${escapeHtml(c.description)}</div></div>
        ${c.remark ? `<div class="col-12"><div class="text-muted">Latest Remark</div><div>${escapeHtml(c.remark)}</div></div>` : ""}
      </div>
      ${c.attachments.length ? `<div class="mt-3"><div class="text-muted small mb-1">Attachments</div>${photoChips(c.attachments)}</div>` : ""}
      <div class="row mt-3 g-3">
        ${c.before_photos.length ? `<div class="col-6"><div class="text-muted small mb-1">Before Work Photos</div>${photoChips(c.before_photos)}</div>` : ""}
        ${c.after_photos.length ? `<div class="col-6"><div class="text-muted small mb-1">After Work Photos</div>${photoChips(c.after_photos)}</div>` : ""}
      </div>

        <div class="text-muted small mb-2">Status Timeline</div>
        ${c.logs.map(l=>`<div class="d-flex justify-content-between small border-bottom py-1">
          <span><span class="badge-status ${STATUS_BADGE[l.status]||''}" style="font-size:.65rem">${l.status}</span> ${l.remark?('— '+escapeHtml(l.remark)):''}</span>
          <span class="text-muted">${fmtDateTime(l.changed_at)} · ${escapeHtml(l.changed_by||'')}</span>
        </div>`).join("")}
      </div>` : ""}

        <button class="btn btn-outline-brand btn-sm" data-bs-dismiss="modal" onclick="openAssignModal(${c.id})"><i class="fa-solid fa-user-plus me-1"></i>Assign</button>

async function openUpdateModal(id){
  let c;
  try{ const res = await api("complaints.php", { params:{action:"get", id} }); c = res.complaint; }
  catch(_) { return; }

  document.getElementById("upd_id_label").textContent = "#"+c.id;
  pendingFiles.before = []; pendingFiles.after = [];
  const isAdmin = currentUser.role === "admin";
  document.getElementById("updateModalBody").innerHTML = `
    <input type="hidden" id="u_id" value="${c.id}">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Employee</label>
        <select class="form-select" id="u_employee" ${isAdmin?'':'disabled'}>
          <option value="">Unassigned</option>
          ${cache.employees.map(e=>`<option value="${e.id}" ${String(c.assigned_to)===String(e.id)?'selected':''}>${e.name} — ${e.mobile}</option>`).join("")}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Status</label>
        <select class="form-select" id="u_status">
          ${STATUS_ORDER.concat(["Rejected"]).map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join("")}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Remark</label>
        <textarea class="form-control" id="u_remark" rows="3">${escapeHtml(c.remark||"")}</textarea>
      </div>
      <div class="col-md-6">
        <label class="form-label">Before Work Photos</label>
        <label class="file-drop d-block" for="u_before"><i class="fa-solid fa-camera me-2"></i>Upload before photos</label>
        <input type="file" id="u_before" class="d-none" multiple accept="image/*">
        <div id="u_before_list" class="mt-2"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label">After Work Photos</label>
        <label class="file-drop d-block" for="u_after"><i class="fa-solid fa-camera-retro me-2"></i>Upload after photos</label>
        <input type="file" id="u_after" class="d-none" multiple accept="image/*">
        <div id="u_after_list" class="mt-2"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label">Completion Date</label>
        <input type="date" class="form-control" id="u_completion" value="${c.completion_date||''}">
      </div>
    </div>`;
  document.getElementById("u_before").addEventListener("change", e=>{
    pendingFiles.before = Array.from(e.target.files);
    renderFileChips("u_before_list", pendingFiles.before, "before");
  });
  document.getElementById("u_after").addEventListener("change", e=>{
    pendingFiles.after = Array.from(e.target.files);
    renderFileChips("u_after_list", pendingFiles.after, "after");
  });
  new bootstrap.Modal(document.getElementById("updateModal")).show();
}

async function saveUpdate(){
  const id = document.getElementById("u_id").value;
  const fd = new FormData();
  fd.append("action","update");
  fd.append("id", id);
  fd.append("employee_id", document.getElementById("u_employee").value);
  fd.append("status", document.getElementById("u_status").value);
  fd.append("remark", document.getElementById("u_remark").value.trim());
  fd.append("completion_date", document.getElementById("u_completion").value);
  pendingFiles.before.forEach(f=>fd.append("before[]", f));
  pendingFiles.after.forEach(f=>fd.append("after[]", f));

  setBusy(true);
  try{
    const res = await api("complaints.php", { method:"POST", form: fd });
    showToast(res.message);
    bootstrap.Modal.getInstance(document.getElementById("updateModal")).hide();
    if(currentUser.role === "admin") await renderAdminSection();
    else await renderEmployee();
  } catch(_) {} finally { setBusy(false); }
}

function openAssignModal(id){
  const c = cache.complaints.find(x=>x.id===id);
  document.getElementById("assign_id_label").textContent = "#"+id;
  document.getElementById("assignModalBody").innerHTML = `
    <input type="hidden" id="a_id" value="${id}">
    <div class="mb-3">
      <label class="form-label">Employee</label>
      <select class="form-select" id="a_employee">
        <option value="">Select employee</option>
        ${cache.employees.filter(e=>e.status==='Active').map(e=>`<option value="${e.id}" ${c && String(c.assigned_to)===String(e.id)?'selected':''}>${e.name} — ${e.department}</option>`).join("")}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Priority</label>
      <select class="form-select" id="a_priority">
        ${["High","Medium","Low"].map(p=>`<option ${c && c.priority===p?'selected':''}>${p}</option>`).join("")}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Expected Completion Date</label>
      <input type="date" class="form-control" id="a_expected">
    </div>
    <div class="mb-1">
      <label class="form-label">Remark</label>
      <textarea class="form-control" id="a_remark" rows="2"></textarea>
    </div>`;
  new bootstrap.Modal(document.getElementById("assignModal")).show();
}

async function saveAssign(){
  const id = document.getElementById("a_id").value;
  const employee_id = document.getElementById("a_employee").value;
  if(!employee_id){ showToast("Please select an employee.","error"); return; }
  const params = {
    action:"assign", id, employee_id,
    priority: document.getElementById("a_priority").value,
    expected_date: document.getElementById("a_expected").value,
    remark: document.getElementById("a_remark").value.trim(),
  };
  setBusy(true);
  try{
    const res = await api("complaints.php", { method:"POST", params });
    showToast(res.message);
    bootstrap.Modal.getInstance(document.getElementById("assignModal")).hide();
    await renderAdminSection();
  } catch(_) {} finally { setBusy(false); }
}

  try{
    const res = await api("complaints.php", { params:{action:"list"} });
    assigned = res.complaints;
    cache.complaints = assigned;
    const empRes = await api("employees.php", { params:{action:"list"} });
    cache.employees = empRes.employees;
  } catch(_) {}

  const html = `
  <div class="app-shell">
    <div class="main" style="flex:1;">
      <div class="page-header">
        <div>

        <div class="col-md-4"><div class="card-flat stat-card"><div class="icon-wrap" style="background:var(--st-completed)"><i class="fa-solid fa-circle-check"></i></div><div><div class="num">${assigned.filter(c=>c.status==='Completed'||c.status==='Closed').length}</div><div class="label">Completed</div></div></div></div>

      <div class="card-flat p-3">

            <tbody>
              ${assigned.map(c=>`
              <tr>
                <td class="mono text-muted">#${c.id}</td>
                <td>${escapeHtml(c.subject)}</td>
                <td>${c.category}</td>
                <td class="priority-${c.priority}">${c.priority}</td>
                <td>${fmtDate(c.complaint_date)}</td>
                <td><span class="badge-status ${STATUS_BADGE[c.status]}">${c.status}</span></td>
                <td class="text-end">
                  <button class="icon-btn view" onclick="openViewModal(${c.id})" title="View"><i class="fa-solid fa-eye"></i></button>
                  <button class="icon-btn edit" onclick="openUpdateModal(${c.id})" title="Update Progress"><i class="fa-solid fa-pen"></i></button>
                </td>
              </tr>`).join("") || `<tr><td colspan="7"><div class="empty-state"><i class="fa-solid fa-clipboard-check d-block"></i>No complaints assigned to you right now</div></td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  ${complaintModalsHTML()}`;
  document.getElementById("app").innerHTML = html;
}

/* =======================================================================
   ROUTER / INIT
   ======================================================================= */
async function setRole(role){
  document.querySelectorAll("#roleSwitch button").forEach(b=>b.classList.toggle("active", b.dataset.role===role));
  if(role==="public"){ renderPublic(); return; }
  if(role==="admin"){
    if(currentUser && currentUser.role==="admin"){ state.adminSection="dashboard"; await renderAdmin(); }
    else renderLogin("admin");
    return;
  }
  if(role==="employee"){
    if(currentUser && currentUser.role==="employee"){ await renderEmployee(); }
    else renderLogin("employee");
    return;
  }
}

document.getElementById("roleSwitch").addEventListener("click", (e)=>{
  const btn = e.target.closest("button");
  if(btn) setRole(btn.dataset.role);
});
document.getElementById("sidebarToggle")?.addEventListener("click", ()=>{
  document.getElementById("adminSidebar")?.classList.toggle("open");
});

(async function init(){
  setBusy(true);
  try{
    const res = await api("auth.php", { params:{action:"me"} });
    currentUser = res.user;
  } catch(_) { currentUser = null; }
  finally { setBusy(false); }

  if(currentUser && currentUser.role==="admin") setRole("admin");
  else if(currentUser && currentUser.role==="employee") setRole("employee");
  else setRole("public");
})();
</script>
