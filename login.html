<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResolveDesk — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --brand-1:#f5821f;
  --brand-2:#f36523;
  --brand-grad: linear-gradient(135deg, var(--brand-1), var(--brand-2));
  --ink:#1e2530;
  --ink-soft:#68707e;
  --line:#e8e8ec;
  --card:#ffffff;
  --bg:#f7f7f9;
  --radius:18px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  font-family:'Inter',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 8%, rgba(245,130,31,.14) 0, transparent 42%),
    radial-gradient(circle at 88% 92%, rgba(243,101,35,.12) 0, transparent 40%),
    var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:64px 16px 40px;
}
h1,h2,h3,.brand-font{font-family:'Poppins',sans-serif;}

.auth-wrap{
  width:100%;
  max-width:420px;
  position:relative;
}

/* ---- circular logo badge, top center, overlapping the card ---- */
.logo-badge{
  position:absolute;
  top:0; left:50%;
  transform:translate(-50%,-58%);
  width:88px;height:88px;
  border-radius:50%;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 24px rgba(243,101,35,.28), 0 0 0 6px #fff;
  z-index:2;
}
.logo-badge .ring{
  position:absolute;
  inset:-4px;
  border-radius:50%;
  padding:4px;
  background:var(--brand-grad);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}
.logo-badge svg{ width:46px; height:46px; position:relative; z-index:1; }
.brand-name{
  text-align:center;
  margin-top:44px;
  font-weight:800;
  font-size:1.3rem;
  letter-spacing:-.01em;
}
.brand-tag{
  text-align:center;
  color:var(--ink-soft);
  font-size:.82rem;
  margin-top:2px;
  margin-bottom:1.6rem;
}

.auth-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:0 20px 48px rgba(30,37,48,.10), 0 2px 8px rgba(30,37,48,.05);
  padding:2.1rem 1.9rem 1.8rem;
  position:relative;
  overflow:hidden;
}

.panel-title{font-weight:700; font-size:1.35rem; margin-bottom:.25rem;}
.panel-sub{color:var(--ink-soft); font-size:.87rem; margin-bottom:1.6rem;}

.field{ margin-bottom:1rem; }
.field label{
  display:block; font-weight:600; font-size:.82rem; margin-bottom:.4rem; color:var(--ink);
}
.input-wrap{ position:relative; }
.input-wrap i.field-icon{
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:#a7adba; font-size:.88rem; pointer-events:none;
}
.input-wrap input{
  width:100%;
  padding:.72rem .9rem .72rem 2.4rem;
  border:1.5px solid var(--line);
  border-radius:10px;
  font-size:.92rem;
  font-family:'Inter',sans-serif;
  color:var(--ink);
  background:#fbfbfc;
  transition:.15s;
}
.input-wrap input::placeholder{ color:#b0b5c0; }
.input-wrap input:focus{
  outline:none;
  border-color:var(--brand-2);
  background:#fff;
  box-shadow:0 0 0 .18rem rgba(243,101,35,.14);
}
.input-wrap .toggle-eye{
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  color:#a7adba; font-size:.85rem; cursor:pointer; background:none; border:none; padding:4px;
}
.input-wrap .toggle-eye:hover{ color:var(--ink-soft); }
.field-hint{ font-size:.74rem; color:var(--ink-soft); margin-top:.35rem; }
.field-hint.err{ color:#d5342c; }
.field-hint.ok{ color:#1aa260; }

.row-between{ display:flex; align-items:center; justify-content:space-between; margin:.2rem 0 1.3rem; }
.remember{ display:flex; align-items:center; gap:.45rem; font-size:.83rem; color:var(--ink-soft); }
.remember input{ accent-color:var(--brand-2); width:15px; height:15px; }
.link-muted{ font-size:.83rem; color:var(--brand-2); font-weight:600; }
.link-muted:hover{ color:var(--brand-1); }

.btn-brand{
  width:100%;
  border:none;
  padding:.8rem;
  border-radius:10px;
  background:var(--brand-grad);
  color:#fff;
  font-weight:700;
  font-size:.94rem;
  box-shadow:0 8px 18px rgba(243,101,35,.32);
  cursor:pointer;
  transition:.15s;
}
.btn-brand:hover{ filter:brightness(1.04); transform:translateY(-1px); }
.btn-brand:active{ transform:translateY(0); }
.btn-brand:disabled{ opacity:.65; cursor:not-allowed; transform:none; }

.switch-line{
  text-align:center;
  margin-top:1.5rem;
  font-size:.87rem;
  color:var(--ink-soft);
}
.switch-line a{
  color:var(--brand-2);
  font-weight:700;
  cursor:pointer;
}
.switch-line a:hover{ color:var(--brand-1); }

.strength{
  display:flex; gap:4px; margin-top:.5rem;
}
.strength span{
  flex:1; height:4px; border-radius:3px; background:var(--line); transition:.2s;
}
.strength.s1 span:nth-child(1){ background:#d5342c; }
.strength.s2 span:nth-child(-n+2){ background:#e8a13a; }
.strength.s3 span:nth-child(-n+3){ background:#1aa260; }

/* panel swap animation */
#panelHost{ position:relative; }
.panel{
  animation: fadeSlide .32s ease;
}
@keyframes fadeSlide{
  from{ opacity:0; transform:translateY(6px); }
  to{ opacity:1; transform:translateY(0); }
}

.toast-host{
  position:fixed; top:18px; right:18px; z-index:50;
  display:flex; flex-direction:column; gap:8px;
}
.toast{
  background:#fff; border-left:4px solid #1aa260; border-radius:8px;
  box-shadow:0 8px 22px rgba(30,37,48,.14);
  padding:.7rem 1rem; font-size:.85rem; font-weight:600;
  display:flex; align-items:center; gap:.5rem;
  animation: fadeSlide .25s ease;
}
.toast.err{ border-left-color:#d5342c; color:#d5342c; }
.toast.ok{ color:#1aa260; }

@media (prefers-reduced-motion: reduce){
  .panel{ animation:none; }
}
@media (max-width:420px){
  .auth-card{ padding:1.7rem 1.3rem 1.5rem; }
}
</style>
</head>
<body>

<div class="toast-host" id="toastHost"></div>

<div class="auth-wrap">
  <div class="logo-badge">
    <div class="ring"></div>
    <!-- Placeholder mark in the Logoipsum minimal-geometric style (hotlinking to logoipsum.com's own image host was retired, so this is drawn inline) -->
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="24" r="13" fill="url(#g1)"/>
      <circle cx="31" cy="18" r="9" fill="url(#g2)" fill-opacity="0.92"/>
      <defs>
        <linearGradient id="g1" x1="5" y1="11" x2="31" y2="37" gradientUnits="userSpaceOnUse">
          <stop stop-color="#f5821f"/><stop offset="1" stop-color="#f36523"/>
        </linearGradient>
        <linearGradient id="g2" x1="22" y1="9" x2="40" y2="27" gradientUnits="userSpaceOnUse">
          <stop stop-color="#f36523"/><stop offset="1" stop-color="#d9531a"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="brand-name">ResolveDesk</div>
  <div class="brand-tag">Complaint Management System</div>

  <div class="auth-card">
    <div id="panelHost"></div>
  </div>
</div>

<script>
const API = "api"; // relative path to api/auth.php — adjust if this file lives elsewhere

function showToast(msg, type="ok"){
  const el = document.createElement("div");
  el.className = "toast " + (type==="err" ? "err" : "ok");
  el.innerHTML = `<i class="fa-solid ${type==='err'?'fa-circle-exclamation':'fa-circle-check'}"></i>${msg}`;
  document.getElementById("toastHost").appendChild(el);
  setTimeout(()=>el.remove(), 3800);
}

function passwordStrength(pw){
  let score = 0;
  if(pw.length >= 6) score++;
  if(/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
  if(pw.length >= 10 && /[^A-Za-z0-9]/.test(pw)) score++;
  return score; // 0-3
}

/* ---------------- SIGN IN ---------------- */
function renderSignIn(){
  document.getElementById("panelHost").innerHTML = `
    <div class="panel" id="panel">
      <div class="panel-title">Welcome back</div>
      <div class="panel-sub">Sign in to manage or track complaints.</div>
      <form id="signInForm" novalidate>
        <div class="field">
          <label>Username or mobile number</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user field-icon"></i>
            <input type="text" id="si_user" placeholder="admin or 9876543210" required autocomplete="username">
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock field-icon"></i>
            <input type="password" id="si_pass" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-eye" onclick="toggleEye('si_pass', this)"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <div class="row-between">
          <label class="remember"><input type="checkbox" id="si_remember"> Remember me</label>
          <a class="link-muted" onclick="showToast('Ask your administrator to reset your password.','ok')">Forgot password?</a>
        </div>
        <button type="submit" class="btn-brand" id="si_submit">Sign In</button>
      </form>
      <div class="switch-line">Don't have an account? <a onclick="renderSignUp()">Sign up</a></div>
    </div>`;

  document.getElementById("signInForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const username = document.getElementById("si_user").value.trim();
    const password = document.getElementById("si_pass").value;
    if(!username || !password){ showToast("Enter your username and password.","err"); return; }
    const btn = document.getElementById("si_submit");
    btn.disabled = true; btn.textContent = "Signing in…";
    try{
      const res = await fetch(`${API}/auth.php`, {
        method:"POST", credentials:"include",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:new URLSearchParams({action:"login", username, password}).toString()
      });
      const data = await res.json();
      if(!data.success) throw new Error(data.message || "Invalid credentials.");
      showToast(`Welcome, ${data.user.display_name}. Redirecting…`);
      const dest = data.user.role === "admin" ? "dashboard.html" : "employee.html";
      setTimeout(()=>{ window.location.href = dest; }, 700);
    } catch(err){
      showToast(err.message || "Could not reach the server.", "err");
      btn.disabled = false; btn.textContent = "Sign In";
    }
  });
}

/* ---------------- SIGN UP ---------------- */
function renderSignUp(){
  document.getElementById("panelHost").innerHTML = `
    <div class="panel" id="panel">
      <div class="panel-title">Create your account</div>
      <div class="panel-sub">Sign up with the mobile number your department has on file.</div>
      <form id="signUpForm" novalidate>
        <div class="field">
          <label>Full name</label>
          <div class="input-wrap">
            <i class="fa-solid fa-signature field-icon"></i>
            <input type="text" id="su_name" placeholder="e.g. Rohit Kadam" required>
          </div>
        </div>
        <div class="field">
          <label>Mobile number <span style="color:var(--ink-soft);font-weight:500;">(used as username)</span></label>
          <div class="input-wrap">
            <i class="fa-solid fa-phone field-icon"></i>
            <input type="tel" id="su_mobile" placeholder="10-digit mobile number" maxlength="10" required>
          </div>
        </div>
        <div class="field">
          <label>Email <span style="color:var(--ink-soft);font-weight:500;">(optional)</span></label>
          <div class="input-wrap">
            <i class="fa-solid fa-envelope field-icon"></i>
            <input type="email" id="su_email" placeholder="you@example.com">
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock field-icon"></i>
            <input type="password" id="su_pass" placeholder="At least 6 characters" required autocomplete="new-password">
            <button type="button" class="toggle-eye" onclick="toggleEye('su_pass', this)"><i class="fa-solid fa-eye"></i></button>
          </div>
          <div class="strength" id="strengthBar"><span></span><span></span><span></span></div>
        </div>
        <div class="field">
          <label>Confirm password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock field-icon"></i>
            <input type="password" id="su_pass2" placeholder="Re-enter password" required autocomplete="new-password">
            <button type="button" class="toggle-eye" onclick="toggleEye('su_pass2', this)"><i class="fa-solid fa-eye"></i></button>
          </div>
          <div class="field-hint" id="matchHint"></div>
        </div>
        <button type="submit" class="btn-brand" id="su_submit">Create Account</button>
      </form>
      <div class="switch-line">Already have an account? <a onclick="renderSignIn()">Sign in</a></div>
    </div>`;

  const pw = document.getElementById("su_pass");
  const pw2 = document.getElementById("su_pass2");
  pw.addEventListener("input", ()=>{
    const s = passwordStrength(pw.value);
    document.getElementById("strengthBar").className = "strength " + (s>0?"s"+s:"");
  });
  pw2.addEventListener("input", ()=>{
    const hint = document.getElementById("matchHint");
    if(!pw2.value){ hint.textContent=""; return; }
    if(pw2.value === pw.value){ hint.textContent="Passwords match."; hint.className="field-hint ok"; }
    else { hint.textContent="Passwords do not match."; hint.className="field-hint err"; }
  });

  document.getElementById("signUpForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const name = document.getElementById("su_name").value.trim();
    const mobile = document.getElementById("su_mobile").value.trim();
    const email = document.getElementById("su_email").value.trim();
    const password = pw.value;
    const password2 = pw2.value;

    if(!name){ showToast("Enter your full name.","err"); return; }
    if(!/^[0-9]{10}$/.test(mobile)){ showToast("Enter a valid 10-digit mobile number.","err"); return; }
    if(password.length < 6){ showToast("Password must be at least 6 characters.","err"); return; }
    if(password !== password2){ showToast("Passwords do not match.","err"); return; }

    const btn = document.getElementById("su_submit");
    btn.disabled = true; btn.textContent = "Creating account…";
    try{
      const res = await fetch(`${API}/auth.php`, {
        method:"POST", credentials:"include",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:new URLSearchParams({action:"signup", name, username:mobile, email, password}).toString()
      });
      const data = await res.json();
      if(!data.success) throw new Error(data.message || "Could not create your account.");
      showToast("Account created. Redirecting…");
      setTimeout(()=>{ window.location.href = "employee.html"; }, 700);
    } catch(err){
      showToast(err.message || "Could not reach the server.", "err");
      btn.disabled = false; btn.textContent = "Create Account";
    }
  });
}

function toggleEye(inputId, btn){
  const input = document.getElementById(inputId);
  const icon = btn.querySelector("i");
  const show = input.type === "password";
  input.type = show ? "text" : "password";
  icon.className = show ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
}

renderSignIn();
</script>
</body>
</html>
