<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAIZE — Sign In / Register</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --brand-1:#f5821f;
    --brand-2:#f36523;
    --slate:#1e2530;
    --slate-2:#262e3b;
    --bg:#f7f7f9;
    --ink:#1e2530;
    --muted:#8a8f9a;
    --line:#e7e7ec;

    --st-raised:#9ca3af;
    --st-assigned:#3b82f6;
    --st-started:#f5821f;
    --st-completed:#22c55e;
    --st-closed:#15803d;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Inter', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand-font{
    font-family:'Poppins', sans-serif;
  }
  .mono{
    font-family:'JetBrains Mono', monospace;
  }

  .auth-shell{
    min-height:100vh;
    display:flex;
  }

  /* ===================== LEFT BRAND PANEL ===================== */
  .brand-panel{
    position:relative;
    flex:0 0 44%;
    max-width:44%;
    background:
      radial-gradient(1100px 700px at -10% -10%, #2a3240 0%, transparent 55%),
      linear-gradient(160deg, var(--slate) 0%, #171c25 100%);
    color:#fff;
    padding:56px 56px 40px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .brand-panel::before{
    content:"";
    position:absolute;
    right:-140px; top:-140px;
    width:340px; height:340px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(245,130,31,.35), rgba(245,130,31,0) 70%);
  }
  .brand-panel::after{
    content:"";
    position:absolute;
    left:-90px; bottom:-120px;
    width:260px; height:260px;
    border-radius:50%;
    background:radial-gradient(circle at 60% 40%, rgba(243,101,35,.25), rgba(243,101,35,0) 70%);
  }

  .brand-mark{
    display:flex;
    align-items:center;
    gap:12px;
    z-index:1;
  }
  .brand-mark .logo-chip{
    width:40px;height:40px;border-radius:11px;
    background:linear-gradient(135deg, var(--brand-1), var(--brand-2));
    display:flex;align-items:center;justify-content:center;
    font-weight:800; font-size:18px; color:#fff;
    box-shadow:0 8px 20px -6px rgba(245,130,31,.6);
    flex-shrink:0;
  }
  .brand-mark span.name{
    font-weight:700; font-size:22px; letter-spacing:.5px;
  }
  .brand-mark span.tag{
    display:block; font-family:'Inter'; font-weight:400; font-size:11.5px;
    letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-top:-2px;
  }

  .brand-headline{
    margin-top:56px;
    z-index:1;
  }
  .brand-headline h1{
    font-size:32px; font-weight:700; line-height:1.28; max-width:380px;
  }
  .brand-headline p{
    color:#b6bcc8; font-size:14.5px; max-width:360px; line-height:1.6; margin-top:14px;
  }

  /* ---- Signature element: vertical status stepper ---- */
  .stepper{
    margin-top:auto;
    padding-top:44px;
    z-index:1;
  }
  .stepper .step-row{
    display:flex;
    align-items:flex-start;
    gap:16px;
    position:relative;
    padding-bottom:26px;
  }
  .stepper .step-row:last-child{ padding-bottom:0; }
  .stepper .rail{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:16px;
  }
  .stepper .dot{
    width:16px;height:16px;border-radius:50%;
    background:var(--slate-2);
    border:2px solid #3a4353;
    z-index:2;
    flex-shrink:0;
    transition:all .4s ease;
  }
  .stepper .connector{
    width:2px; flex:1;
    background:#333c4a;
    margin-top:2px;
    min-height:24px;
  }
  .stepper .connector.lit{
    background:linear-gradient(180deg, var(--brand-1), var(--brand-2));
  }
  .stepper .dot.lit{
    background:linear-gradient(135deg, var(--brand-1), var(--brand-2));
    border-color:transparent;
    box-shadow:0 0 0 4px rgba(245,130,31,.18);
  }
  .stepper .dot.pulse{
    animation:pulse-dot 1.8s ease-in-out infinite;
  }
  @keyframes pulse-dot{
    0%,100%{ box-shadow:0 0 0 4px rgba(245,130,31,.18); }
    50%{ box-shadow:0 0 0 8px rgba(245,130,31,.08); }
  }
  .stepper .step-label{
    font-size:13.5px; font-weight:500; color:#8f95a3; margin-top:-1px;
    transition:color .4s ease;
  }
  .stepper .step-label small{
    display:block; font-family:'JetBrains Mono'; font-size:10.5px; color:#5c6474; margin-top:2px; letter-spacing:.5px;
  }
  .stepper .step-label.lit{ color:#f1f1f3; }

  .brand-foot{
    z-index:1;
    margin-top:36px;
    padding-top:18px;
    border-top:1px solid rgba(255,255,255,.08);
    font-size:12px; color:#6f7789;
    display:flex; justify-content:space-between; align-items:center;
  }
  .brand-foot .cmp-id{ color:#c7cbd4; }

  /* ===================== RIGHT FORM PANEL ===================== */
  .form-panel{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 24px;
  }
  .form-card{
    width:100%;
    max-width:436px;
  }

  .form-logo{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:32px;
  }
  .form-logo .logo-chip-sm{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(135deg, var(--brand-1), var(--brand-2));
    display:flex;align-items:center;justify-content:center;
    font-family:'Poppins'; font-weight:800; font-size:15px; color:#fff;
    box-shadow:0 6px 16px -5px rgba(245,130,31,.5);
    flex-shrink:0;
  }
  .form-logo span{
    font-family:'Poppins'; font-weight:700; font-size:19px; letter-spacing:.5px; color:var(--ink);
  }

  .role-switch{
    display:flex;
    background:#eeeef1;
    border-radius:12px;
    padding:4px;
    gap:4px;
    margin-bottom:28px;
  }
  .role-switch button{
    flex:1;
    border:none;
    background:transparent;
    padding:9px 6px;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    border-radius:9px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:all .2s ease;
  }
  .role-switch button i{ font-size:12px; }
  .role-switch button.active{
    background:#fff;
    color:var(--ink);
    box-shadow:0 2px 8px rgba(30,37,48,.08);
  }
  .role-switch button.active.role-public{ color:var(--brand-2); }
  .role-switch button.active.role-employee{ color:#2563eb; }
  .role-switch button.active.role-admin{ color:var(--slate); }

  .mode-tabs{
    display:flex;
    gap:28px;
    border-bottom:1px solid var(--line);
    margin-bottom:26px;
  }
  .mode-tabs button{
    border:none; background:none;
    padding:4px 2px 12px;
    font-family:'Poppins'; font-weight:600; font-size:16.5px;
    color:var(--muted);
    position:relative;
  }
  .mode-tabs button.active{ color:var(--ink); }
  .mode-tabs button.active::after{
    content:"";
    position:absolute; left:0; bottom:-1px; height:2px; width:100%;
    background:linear-gradient(90deg, var(--brand-1), var(--brand-2));
    border-radius:2px;
  }
  .mode-tabs button:disabled{
    color:#d3d5da; cursor:not-allowed;
  }

  .form-eyebrow{
    font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); font-weight:600; margin-bottom:6px;
  }
  .form-title{ font-size:23px; font-weight:700; margin-bottom:4px; }
  .form-sub{ font-size:13.5px; color:var(--muted); margin-bottom:26px; }

  .field{ margin-bottom:16px; }
  .field label{
    font-size:12.5px; font-weight:600; color:#4a5160; margin-bottom:6px; display:block;
  }
  .input-wrap{ position:relative; }
  .input-wrap i.leading{
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:#b7bac2; font-size:14px;
  }
  .form-control{
    padding:11px 14px 11px 40px;
    border-radius:10px;
    border:1.5px solid var(--line);
    font-size:14px;
    background:#fff;
  }
  .form-control:focus{
    border-color:var(--brand-1);
    box-shadow:0 0 0 3px rgba(245,130,31,.14);
  }
  .toggle-eye{
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none;border:none;color:#b7bac2; font-size:14px; padding:4px;
  }
  .toggle-eye:hover{ color:var(--muted); }

  .strength-meter{
    height:4px; border-radius:3px; background:var(--line); margin-top:8px; overflow:hidden;
  }
  .strength-meter span{
    display:block; height:100%; width:0%; border-radius:3px;
    background:var(--st-raised); transition:all .3s ease;
  }
  .strength-text{ font-size:11px; color:var(--muted); margin-top:5px; }

  .field-error{
    font-size:11.5px; color:#dc2626; margin-top:5px; display:none;
  }
  .field.has-error .form-control{ border-color:#dc2626; }
  .field.has-error .field-error{ display:block; }

  .row-inline{ display:flex; justify-content:space-between; align-items:center; margin:6px 0 22px; }
  .row-inline .form-check-label{ font-size:13px; color:var(--muted); }
  .link-orange{ color:var(--brand-2); font-size:13px; font-weight:600; text-decoration:none; }
  .link-orange:hover{ color:var(--brand-1); text-decoration:underline; }

  .btn-brand{
    width:100%;
    background:linear-gradient(135deg, var(--brand-1), var(--brand-2));
    border:none;
    color:#fff;
    font-weight:600;
    padding:12px;
    border-radius:10px;
    font-size:14.5px;
    box-shadow:0 10px 22px -8px rgba(243,101,35,.55);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-brand:hover{ transform:translateY(-1px); box-shadow:0 14px 26px -8px rgba(243,101,35,.6); color:#fff;}
  .btn-brand:active{ transform:translateY(0); }
  .btn-brand:disabled{ opacity:.7; transform:none; }

  .switch-line{
    text-align:center; font-size:13.5px; color:var(--muted); margin-top:22px;
  }
  .switch-line button{
    background:none; border:none; color:var(--brand-2); font-weight:600; padding:0;
  }

  .admin-note{
    display:flex; gap:10px; align-items:flex-start;
    background:#fff4ea; border:1px solid #fbdcb8; border-radius:10px;
    padding:12px 14px; font-size:12.5px; color:#8a5417; margin-bottom:22px;
  }
  .admin-note i{ margin-top:2px; color:var(--brand-2); }

  /* success overlay */
  .success-screen{
    display:none;
    text-align:center;
    padding:20px 4px;
  }
  .success-screen.show{ display:block; }
  .success-icon{
    width:72px; height:72px; border-radius:50%; margin:0 auto 20px;
    background:linear-gradient(135deg, var(--st-completed), var(--st-closed));
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:28px;
    box-shadow:0 12px 26px -8px rgba(21,128,61,.45);
  }
  .success-screen h3{ font-size:20px; font-weight:700; margin-bottom:8px; }
  .success-screen p{ color:var(--muted); font-size:13.5px; margin-bottom:20px; }
  .success-id{
    display:inline-block; background:#f2f2f5; border-radius:8px; padding:8px 14px;
    font-size:13px; color:var(--ink); margin-bottom:24px;
  }

  @media (max-width: 900px){
    .brand-panel{ display:none; }
    .form-panel{ padding:32px 18px; }
  }

  @media (prefers-reduced-motion: reduce){
    .stepper .dot.pulse{ animation:none; }
  }
</style>
</head>

<script>
/* =========================================================
   IN-MEMORY "DATABASE"
========================================================= */
const DB = {
  public: [
    { name:"Asha Rao", email:"asha@example.com", phone:"9876543210", password:"Public@123" }
  ],
  employee: [
    { name:"Vikram Sen", empId:"EMP-1042", dept:"Sanitation", email:"vikram@raize.gov", password:"Employee@123" }
  ],
  admin: [
    { name:"System Admin", email:"admin@raize.gov", adminKey:"RAIZE-ADM-9001", password:"Admin@123" }
  ]
};

const STATUS_STEPS = [
  { key:"raised",    label:"Raised",    hint:"CMP-2026-04871", color:"var(--st-raised)" },
  { key:"assigned",  label:"Assigned",  hint:"Sanitation Dept.", color:"var(--st-assigned)" },
  { key:"started",   label:"Started",   hint:"In progress", color:"var(--st-started)" },
  { key:"completed", label:"Completed", hint:"Resolved on-site", color:"var(--st-completed)" },
  { key:"closed",    label:"Closed",    hint:"Confirmed by citizen", color:"var(--st-closed)" }
];

let state = {
  role: "public",     // public | employee | admin
  mode: "login",      // login | register
  litIndex: 2         // how far the decorative stepper is "lit" (demo state)
};

/* =========================================================
   STEPPER (signature element)
========================================================= */
function renderStepper(){
  const wrap = document.getElementById("stepper");
  wrap.innerHTML = "";
  STATUS_STEPS.forEach((step, i) => {
    const lit = i <= state.litIndex;
    const isCurrent = i === state.litIndex;
    const row = document.createElement("div");
    row.className = "step-row";
    row.innerHTML = `
      <div class="rail">
        <div class="dot ${lit ? 'lit':''} ${isCurrent ? 'pulse':''}"></div>
        ${i < STATUS_STEPS.length - 1 ? `<div class="connector ${i < state.litIndex ? 'lit':''}"></div>` : ``}
      </div>
      <div class="step-label ${lit ? 'lit':''}">
        ${step.label}
        <small class="mono">${step.hint}</small>
      </div>
    `;
    wrap.appendChild(row);
  });
}
renderStepper();
setInterval(() => {
  state.litIndex = (state.litIndex + 1) % STATUS_STEPS.length;
  renderStepper();
}, 2600);

/* =========================================================
   ROLE + MODE SWITCHING
========================================================= */
document.getElementById("roleSwitch").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if(!btn) return;
  document.querySelectorAll("#roleSwitch button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  state.role = btn.dataset.role;

  // Admin accounts are provisioned, not self-registered
  const regTab = document.querySelector('#modeTabs button[data-mode="register"]');
  if(state.role === "Public"){
    state.mode = "login";
    regTab.disabled = true;
    document.querySelectorAll("#modeTabs button").forEach(b => b.classList.remove("active"));
    document.querySelector('#modeTabs button[data-mode="login"]').classList.add("active");
  } else {
    regTab.disabled = false;
  }
  renderForm();
});

document.getElementById("modeTabs").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if(!btn || btn.disabled) return;
  document.querySelectorAll("#modeTabs button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  state.mode = btn.dataset.mode;
  renderForm();
});

/* =========================================================
   FORM TEMPLATES
========================================================= */
function fieldHTML({id, label, type="text", icon, placeholder, extra=""}){
  return `
    <div class="field" id="field-${id}">
      <label for="${id}">${label}</label>
      <div class="input-wrap">
        <i class="leading fa-solid ${icon}"></i>
        <input type="${type}" class="form-control" id="${id}" placeholder="${placeholder}" ${extra}>
        ${type === "password" ? `<button type="button" class="toggle-eye" data-target="${id}"><i class="fa-solid fa-eye"></i></button>` : ``}
      </div>
      <div class="field-error" id="err-${id}"></div>
    </div>
  `;
}

const ROLE_META = {
  public:   { name:"Public", eyebrow:"Citizen Portal", loginTitle:"Welcome back", loginSub:"Sign in to file or track a complaint.",
              regTitle:"Create your account", regSub:"Register to raise complaints and follow their status." },
  employee: { name:"Employee", eyebrow:"Staff Portal", loginTitle:"Staff sign in", loginSub:"Access your assigned complaint queue.",
              regTitle:"Employee registration", regSub:"Register with your department ID — pending admin approval." },
  admin:    { name:"Admin", eyebrow:"Admin Console", loginTitle:"Admin sign in", loginSub:"Restricted access for system administrators.",
              regTitle:"", regSub:"" }
};

function renderForm(){
  const zone = document.getElementById("formZone");
  document.getElementById("successScreen").classList.remove("show");
  zone.style.display = "block";
  const meta = ROLE_META[state.role];

  let inner = "";

  if(state.mode === "login"){
    inner += `<div class="form-eyebrow">${meta.eyebrow}</div>`;
    inner += `<div class="form-title">${meta.loginTitle}</div>`;
    inner += `<div class="form-sub">${meta.loginSub}</div>`;

    inner += fieldHTML({id:"reg-phone", label:"Phone number", type:"tel", icon:"fa-phone", placeholder:"10-digit mobile number"});
    
    inner += fieldHTML({id:"reg-email", label:"Email address", type:"email", icon:"fa-envelope", placeholder:"you@example.com"});
    inner += fieldHTML({id:"reg-password", label:"Password", type:"password", icon:"fa-lock", placeholder:"At least 8 characters"});
    inner += `<div class="strength-meter"><span id="strengthBar"></span></div><div class="strength-text" id="strengthText">Password strength</div>`;
    inner += `<div style="height:16px"></div>`;
    inner += fieldHTML({id:"reg-confirm", label:"Confirm password", type:"password", icon:"fa-lock", placeholder:"Re-enter your password"});

    inner += `
      <div class="row-inline" style="margin-top:2px;">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="agree">
          <label class="form-check-label" for="agree">I agree to the terms &amp; privacy policy</label>
        </div>
      </div>
      <button class="btn-brand" id="submitBtn">Create ${meta.name} account</button>
      <div class="switch-line">
        Already have an account? <button data-go="login">Sign in</button>
      </div>
    `;
  }

  zone.innerHTML = inner;
  wireForm();
}

/* =========================================================
   WIRE UP: password toggles, strength meter, switch links, submit
========================================================= */
function wireForm(){
  document.querySelectorAll(".toggle-eye").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      const icon = btn.querySelector("i");
      if(input.type === "password"){ input.type = "text"; icon.classList.replace("fa-eye","fa-eye-slash"); }
      else { input.type = "password"; icon.classList.replace("fa-eye-slash","fa-eye"); }
    });
  });

  document.querySelectorAll("[data-go]").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = btn.dataset.go;
      document.querySelectorAll("#modeTabs button").forEach(b => b.classList.remove("active"));
      document.querySelector(`#modeTabs button[data-mode="${target}"]`).classList.add("active");
      state.mode = target;
      renderForm();
    });
  });

  const regPw = document.getElementById("reg-password");
  if(regPw){
    regPw.addEventListener("input", () => updateStrength(regPw.value));
  }

  const submitBtn = document.getElementById("submitBtn");
  if(submitBtn){
    submitBtn.addEventListener("click", (e) => {
      e.preventDefault();
      state.mode === "login" ? handleLogin() : handleRegister();
    });
  }
}

function updateStrength(pw){
  const bar = document.getElementById("strengthBar");
  const text = document.getElementById("strengthText");
  let score = 0;
  if(pw.length >= 8) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    { pct:0,   color:"var(--st-raised)",   label:"Password strength" },
    { pct:25,  color:"#ef4444",            label:"Weak" },
    { pct:55,  color:"var(--st-started)",  label:"Fair" },
    { pct:80,  color:"var(--st-assigned)", label:"Good" },
    { pct:100, color:"var(--st-completed)",label:"Strong" }
  ];
  const l = levels[score];
  bar.style.width = l.pct + "%";
  bar.style.background = l.color;
  text.textContent = pw.length ? l.label : "Password strength";
}

/* =========================================================
   VALIDATION HELPERS
========================================================= */
function setError(id, msg){
  const field = document.getElementById(`field-${id}`);
  const err = document.getElementById(`err-${id}`);
  if(!field) return;
  if(msg){
    field.classList.add("has-error");
    err.textContent = msg;
  } else {
    field.classList.remove("has-error");
    err.textContent = "";
  }
}

function isEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function isPhone(v){ return /^\d{10}$/.test(v); }

/* =========================================================
   LOGIN
========================================================= */
function handleLogin(){
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  let ok = true;

  if(!email){ setError("login-email","Email is required."); ok = false; }
  else if(!isEmail(email)){ setError("login-email","Enter a valid email address."); ok = false; }
  else setError("login-email", null);

  if(!password){ setError("login-password","Password is required."); ok = false; }
  else setError("login-password", null);

  if(!ok) return;

  const list = DB[state.role];
  const user = list.find(u => u.email.toLowerCase() === email.toLowerCase());

  if(!user){
    setError("login-email","No account found with this email.");
    return;
  }
  if(user.password !== password){
    setError("login-password","Incorrect password.");
    return;
  }

  showSuccess({
    title: `Welcome back, ${user.name.split(" ")[0]}`,
    sub: `Redirecting to the ${ROLE_META[state.role].name} dashboard…`,
    id: state.role === "public" ? "#CMP-2026-04871" : (user.empId || user.adminKey || "")
  });
}

/* =========================================================
   REGISTER
========================================================= */
function handleRegister(){
  let ok = true;
  const name = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pw = document.getElementById("reg-password").value;
  const confirm = document.getElementById("reg-confirm").value;

  if(!name){ setError("reg-name","Full name is required."); ok = false; } else setError("reg-name", null);

  let empId, dept, phone;

  if(state.role === "employee"){
    empId = document.getElementById("reg-empid").value.trim();
    dept = document.getElementById("reg-dept").value;
    if(!empId){ setError("reg-empid","Employee ID is required."); ok = false; } else setError("reg-empid", null);
    if(!dept){ setError("reg-dept","Please select a department."); ok = false; } else setError("reg-dept", null);
  } else {
    phone = document.getElementById("reg-phone").value.trim();
    if(!phone){ setError("reg-phone","Phone number is required."); ok = false; }
    else if(!isPhone(phone)){ setError("reg-phone","Enter a valid 10-digit number."); ok = false; }
    else setError("reg-phone", null);
  }

  if(!email){ setError("reg-email","Email is required."); ok = false; }
  else if(!isEmail(email)){ setError("reg-email","Enter a valid email address."); ok = false; }
  else if(DB[state.role].some(u => u.email.toLowerCase() === email.toLowerCase())){
    setError("reg-email","An account with this email already exists."); ok = false;
  }
  else setError("reg-email", null);

  if(!pw){ setError("reg-password","Password is required."); ok = false; }
  else if(pw.length < 8){ setError("reg-password","Use at least 8 characters."); ok = false; }
  else setError("reg-password", null);

  if(!confirm){ setError("reg-confirm","Please confirm your password."); ok = false; }
  else if(confirm !== pw){ setError("reg-confirm","Passwords do not match."); ok = false; }
  else setError("reg-confirm", null);

  const agree = document.getElementById("agree").checked;
  if(!agree){ ok = false; document.getElementById("agree").parentElement.classList.add("has-error"); }
  else document.getElementById("agree").parentElement.classList.remove("has-error");

  if(!ok) return;

  const newUser = { name, email, password: pw };
  if(state.role === "employee"){ newUser.empId = empId; newUser.dept = dept; }
  else { newUser.phone = phone; }
  DB[state.role].push(newUser);

  showSuccess({
    title: `Account created, ${name.split(" ")[0]}`,
    sub: state.role === "employee"
      ? "Your registration is pending department approval."
      : "Redirecting to your citizen dashboard…",
    id: state.role === "employee" ? empId : "#CMP-2026-04872"
  });
}

/* =========================================================
   SUCCESS SCREEN
========================================================= */
function showSuccess({title, sub, id}){
  document.getElementById("formZone").style.display = "none";
  document.getElementById("successTitle").textContent = title;
  document.getElementById("successSub").textContent = sub;
  document.getElementById("successId").textContent = id;
  document.getElementById("successScreen").classList.add("show");
}

document.getElementById("successBtn").addEventListener("click", () => {
  document.getElementById("successScreen").classList.remove("show");
  document.getElementById("formZone").style.display = "block";
  state.mode = "login";
  document.querySelectorAll("#modeTabs button").forEach(b => b.classList.remove("active"));
  document.querySelector('#modeTabs button[data-mode="login"]').classList.add("active");
  renderForm();
});

/* init */
renderForm();
</script>
</body>
</html>
